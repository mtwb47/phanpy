services:
  # Development server with hot reload
  dev:
    build:
      context: .
      target: development
    ports:
      - "5174:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/src/iconify-icons
    environment:
      - NODE_ENV=development
    profiles:
      - dev

  # Production build served by nginx
  app:
    build:
      context: .
      target: production
    ports:
      - "8070:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - prod

  # One-shot build (outputs to ./dist)
  build:
    build:
      context: .
      target: builder
    volumes:
      - ./dist:/app/dist
    command: sh -c "npm run build && cp -r /app/dist/* /app/dist/"
    profiles:
      - build
